<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;700&family=Courier+Prime:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="layout">

    <!-- ─────────────────────────────────────
         Panel izquierdo: Controlador
    ───────────────────────────────────────-->
    <section class="panel controller">

      <button class="btn-solo-reloj" id="btnSoloReloj">SOLO RELOJ</button>

      <div class="assignment-info" id="assignmentInfo">
        <p class="placeholder">← Selecciona una parte del programa</p>
      </div>

      <div class="timer-box" id="timerBox">
        <span class="timer-digits" id="timerDisplay">--:--</span>
      </div>

      <div class="control-row">
        <button class="btn-main btn-start" id="btnStart" disabled>START</button>
        <button class="btn-main btn-pause" id="btnPause" disabled>PAUSA</button>
      </div>

      <div class="times-block">
        <div class="times-header">
          <span>INICIO</span>
          <span>FINAL</span>
        </div>
        <div class="times-values">
          <span id="displayStart">--:--</span>
          <span id="displayEnd">--:--</span>
        </div>
      </div>

      <div class="adjust-row">
        <button class="btn-adjust" data-delta="-10">-10 seg.</button>
        <button class="btn-adjust" data-delta="-60">-1 min.</button>
        <button class="btn-adjust" data-delta="60">+1 min.</button>
        <button class="btn-adjust" data-delta="10">+10 seg.</button>
      </div>

    </section>

    <!-- ─────────────────────────────────────
         Panel derecho: Programa
    ───────────────────────────────────────-->
    <section class="panel program">
      <header class="program-header" id="programHeader">
        <span id="programTitle">Programa</span>
        <span>Min</span>
      </header>
      <div class="program-list" id="programList"></div>
    </section>

  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
